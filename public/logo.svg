<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#bg)"/>
  <!-- Download arrow -->
  <path d="M36 48 L60 76 L84 48" stroke="url(#arrow)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow shaft top -->
  <path d="M60 28 L60 72" stroke="url(#arrow)" stroke-width="7" stroke-linecap="round"/>
  <!-- Small platform underline -->
  <path d="M32 86 L88 86" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>
