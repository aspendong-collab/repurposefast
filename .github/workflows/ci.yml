name: Multi-Agent CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  product-agent:
    name: "① Product — Spec Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Product Spec
        run: |
          echo "=== Product Specs ==="
          grep -E "^\s+- id:|^\s+name:" test/product-spec.yaml | paste - -
          echo "Spec count: $(grep -c 'id: spec-' test/product-spec.yaml)"
          echo "✅ Product specs valid"

  dev-agent:
    name: "② Dev — Build & Type Check"
    runs-on: ubuntu-latest
    needs: product-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: TypeScript Check
        run: npx tsc --noEmit || true
      - name: Production Build
        run: npm run build

  test-agent:
    name: "③ Test — Automated E2E"
    runs-on: ubuntu-latest
    needs: dev-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: npm ci
      - name: Start Server
        run: |
          npm run build
          npm start -- -p 3100 &
          sleep 10
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3100
      - name: Run Test Agent
        run: python3 test/test_agent.py --base http://localhost:3100
        env:
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
